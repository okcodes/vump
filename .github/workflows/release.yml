name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create GitHub releases and upload assets

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check release tag matches source version
        # Uses the action defined in this repo itself.
        uses: ./.github/actions/check
        with:
          version: ${{ github.ref_name }}

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh

      - name: Build all platform binaries
        run: |
          chmod +x build.sh
          ./build.sh

      # Only first release ever needed this as no release where to download binaries from.
      # for the ./.github/actions/check action to work.
      # - name: Verify tag matches source versions
      #   # Uses the linux-amd64 binary just built above — no Go install needed.
      #   run: ./dist/vump-linux-amd64 check "${{ github.ref_name }}"

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "vump ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
