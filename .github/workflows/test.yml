name: Test

on:
  push:
    branches: ['**']
    tags-ignore: ['**']   # releases are handled by release.yml
  pull_request:

jobs:
  test:
    name: Unit & E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Vet and test
        run: |
          chmod +x test.sh
          ./test.sh
