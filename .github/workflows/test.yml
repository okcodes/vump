name: Test

on:
  push:
    branches: ['**']
    tags-ignore: ['**']   # releases are handled by release.yml
  pull_request:

jobs:
  test:
    name: Unit & E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
