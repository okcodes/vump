# Example vump.toml
# Place this file at the root of your monorepo.

# Optional git integration.
# CLI flags (--commit, --tag) override these settings.
[git]
commit = true
commit_message = "chore: bump version to v{new_version}"
tag = false
tag_pattern = "v{new_version}"

# Declare every file that vump should keep in sync.
# Supported filenames: package.json, Cargo.toml, VERSION

[[files]]
path = "VERSION"

